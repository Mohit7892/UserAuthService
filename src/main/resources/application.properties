spring.application.name=userservice

##DB connection properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/userauthserviceapril26
spring.datasource.username=userauthserviceapril26_user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Eureke client properties
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#to enable running multiple instances on different ports
server.port=${port}

